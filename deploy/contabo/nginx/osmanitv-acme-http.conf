# Phase 1 — HTTP only for Let's Encrypt webroot (before certs exist).
# Replaced by nassanitv-domains.conf after setup-nassanitv-ssl.sh succeeds.

server {
    listen 80;
    listen [::]:80;
    server_name api.nassanitv.com admin.nassanitv.com nassanitv.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
    }

    location / {
        return 200 'Nassani TV — awaiting TLS provisioning\n';
        add_header Content-Type text/plain;
    }
}
