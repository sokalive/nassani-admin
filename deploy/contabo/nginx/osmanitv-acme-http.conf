# Phase 1 — HTTP only for Let's Encrypt webroot (before certs exist).
# Replaced by osmanitv-domains.conf after setup-osmanitv-ssl.sh succeeds.

server {
    listen 80;
    listen [::]:80;
    server_name api.osmanitv.com admin.osmanitv.com osmanitv.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
    }

    location / {
        return 200 'Osmani TV — awaiting TLS provisioning\n';
        add_header Content-Type text/plain;
    }
}
