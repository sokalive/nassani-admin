# Pre-certificate HTTP ACME hosts for Nassani TV.
server {
    listen 80;
    listen [::]:80;
    server_name api.nassanitv.online admin.nassanitv.online nassanitv.online;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
    }

    location / {
        return 200 'Nassani TV ACME ready';
        add_header Content-Type text/plain;
    }
}
