# Nassani TV production domains (VPS testing — Render API stays live for legacy APK).
# api.nassanitv.online   → Node API
# admin.nassanitv.online → Admin SPA + /api
# nassanitv.online       → Public landing
#
# TLS cert (SAN): /etc/letsencrypt/live/nassanitv.online/

# --- HTTP → HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name api.nassanitv.online admin.nassanitv.online nassanitv.online;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- API ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.nassanitv.online;

    ssl_certificate     /etc/letsencrypt/live/nassanitv.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nassanitv.online/privkey.pem;
    include /etc/nginx/snippets/nassani-ssl-params.conf;

    include /etc/nginx/snippets/nassani-node-api.conf;

    # Root must return 200 for health probes (not 302).
    location = / {
        proxy_pass http://127.0.0.1:10001/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- Admin panel ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.nassanitv.online;

    ssl_certificate     /etc/letsencrypt/live/nassanitv.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nassanitv.online/privkey.pem;
    include /etc/nginx/snippets/nassani-ssl-params.conf;

    root /var/www/nassani-admin/dist;
    index index.html;

    include /etc/nginx/snippets/nassani-node-api.conf;

    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}

# --- Main site ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nassanitv.online;

    ssl_certificate     /etc/letsencrypt/live/nassanitv.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nassanitv.online/privkey.pem;
    include /etc/nginx/snippets/nassani-ssl-params.conf;

    root /var/www/nassani-admin/deploy/contabo/public-nassanitv;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
