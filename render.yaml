# Render Blueprint — static admin SPA (Vite).
# Build env matches VPS: VITE_API_BASE_URL empty; runtime api.js routes API host.
# MIGRATION: Primary admin UI is on VPS (http://62.171.131.113). Keep this service until
# verify-admin-vps.mjs passes, then suspend nassani-admin-mpya only — NOT nassani-admin-api.

services:
  - type: web
    name: nassani-admin-mpya
    runtime: static
    autoDeploy: true
    repo: https://github.com/sokalive/nassani-admin.git
    branch: main
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      # Leave empty — same as VPS (deploy/contabo/apply-cutover.sh). Runtime api.js resolves
      # admin.nassanitv.online → Render Node API; admin.nassanitv.online → same-origin /api.
      - key: VITE_API_BASE_URL
        value: ""
    routes:
      # Static host has no Node /api — proxy to VPS API (uploads live on Contabo disk).
      - type: redirect
        source: /api/*
        destination: https://api.nassanitv.online/api/:splat
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      # Hashed bundles — safe to cache aggressively (filename changes each build).
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      # SPA shell — always revalidate so clients pick up new chunk references quickly.
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /
        name: Cache-Control
        value: no-cache, no-store, must-revalidate

  # Node API — persistent media uploads (attach disk + set UPLOAD_DIR to mountPath).
  # Sizing: Starter is the minimum plan that supports persistent disks (cannot downgrade to Free).
  # See docs/RENDER_SIZING.md. Keep instance count at 1 unless Metrics justify scaling up.
  - type: web
    name: nassani-admin-api
    runtime: node
    autoDeploy: true
    region: oregon
    plan: starter
    rootDir: server
    repo: https://github.com/sokalive/nassani-admin.git
    branch: main
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: UPLOAD_DIR
        value: /var/render/media/uploads
      - key: NOTIFICATION_IMAGE_STORAGE
        value: remote
      - key: NOTIFICATION_IMAGE_VPS_INGEST_URL
        value: https://api.nassanitv.online/api/internal/notification-images
      - key: NOTIFICATION_IMAGE_PUBLIC_ORIGIN
        value: https://api.nassanitv.online
      - key: NOTIFICATION_IMAGE_INGEST_TOKEN
        sync: false
      - key: INSTRUCTION_VIDEO_STORAGE
        value: remote
      - key: INSTRUCTION_VIDEO_VPS_INGEST_URL
        value: https://api.nassanitv.online/api/internal/instruction-videos
      - key: INSTRUCTION_VIDEO_PUBLIC_ORIGIN
        value: https://api.nassanitv.online
      - key: INSTRUCTION_VIDEO_INGEST_TOKEN
        sync: false
      - key: BEEM_SENDER_NAME
        value: NASSANITVMAX
      - key: BEEM_API_KEY
        sync: false
      - key: BEEM_SECRET_KEY
        sync: false
      - key: NODE_VERSION
        value: "20"
      # Set in Render dashboard to your Bunny pull zone (e.g. https://nassani-media.b-cdn.net)
      - key: BUNNY_CDN_BASE_URL
        sync: false
      - key: BASE_URL
        sync: false
      - key: SERVER_HEALTH_BACKGROUND_ENABLED
        value: "0"
      - key: PG_POOL_MAX
        value: "8"
      - key: PG_POOL_STATS
        value: "1"
      # Render starter: avoid startup pool hog + SSE poll storm (legacy APK subscription-stream).
      - key: AUTO_RECONCILE_UNBLOCKED_PLAYBACK
        value: "0"
      - key: WARM_API_CACHE_ON_STARTUP
        value: "0"
      - key: MODE_SSE_POLL_MS
        value: "5000"
      # Render pool max 8 — keep verify slots below pool headroom (LISTEN relay holds 1 client).
      - key: VERIFY_DB_MAX_CONCURRENT
        value: "6"
      - key: SONICPESA_INBOX_WORKER
        value: "0"
      - key: SONICPESA_RECONCILE_QUEUE_WORKER
        value: "0"
      - key: STREAM_DELIVERY_MODE
        value: hybrid
      - key: DIRECT_STREAM_SIGNING_ENABLED
        value: "1"
      - key: STREAM_PLAYBACK_FORCE_PROXY
        value: "1"
      - key: DIRECT_STREAM_CUTOVER_ENABLED
        value: "0"
      - key: DIRECT_STREAM_ROLLOUT_PERCENT
        value: "0"
      - key: DIRECT_STREAM_SIGNING_SECRET
        sync: false
      - key: STREAM_SEGMENT_DELIVERY
        value: bunny
      - key: STREAM_SEGMENT_FORCE_PROXY
        value: "0"
      - key: STREAM_SEGMENT_SELECTIVE_ROUTING
        value: "1"
      - key: BUNNY_STREAM_CDN_BASE_URL
        sync: false
      - key: STREAM_SEGMENT_TOKEN_TTL_SEC
        value: "600"
      # Comma-separated host suffixes (auto-detect also includes ycn-redirect.com, lanexa.online, etc.)
      - key: STREAM_SEGMENT_PROTECTED_HOSTS
        sync: false
    disk:
      name: media-uploads
      mountPath: /var/render/media
      sizeGB: 1
