name: Deploy Contabo (Nassani)

on:
  push:
    branches: [main]
    paths:
      - 'deploy/contabo/**'
      - 'server/**'
      - 'src/**'
      - 'package.json'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Skip when CONTABO_SSH_KEY is not configured
        id: gate
        env:
          CONTABO_SSH_KEY: ${{ secrets.CONTABO_SSH_KEY }}
        run: |
          if [ -z "${CONTABO_SSH_KEY}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::CONTABO_SSH_KEY not set — skipping VPS deploy. Run bootstrap-nassani-vps.sh / pull-and-apply.sh on the VPS."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Contabo VPS
        if: steps.gate.outputs.skip != 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 169.58.18.86
          username: root
          key: ${{ secrets.CONTABO_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -euo pipefail
            test -d /var/www/nassani-admin || {
              echo "ERROR: /var/www/nassani-admin missing — run bootstrap-nassani-vps.sh first" >&2
              exit 1
            }
            cd /var/www/nassani-admin
            git remote get-url origin | grep -qi nassani-admin
            export CERTBOT_EMAIL="${CERTBOT_EMAIL:-admin@nassanitv.online}"
            export NASSANI_SKIP_NASSANITV_SSL="${NASSANI_SKIP_NASSANITV_SSL:-1}"
            bash deploy/contabo/pull-and-apply.sh

      - name: Verify VPS HTTP health
        if: steps.gate.outputs.skip != 'true'
        env:
          CONTABO_HOST: 169.58.18.86
        run: |
          set -euo pipefail
          EXPECT="${{ github.sha }}"
          BASE="http://${CONTABO_HOST}"
          ok=0
          for attempt in $(seq 1 20); do
            curl -fsS "${BASE}/api/health" | tee /tmp/vps-health.json
            COMMIT="$(node -e "console.log(String(require('/tmp/vps-health.json').commit||''))")"
            echo "attempt $attempt commit=${COMMIT:0:12} expect=${EXPECT:0:12}"
            if [[ "${COMMIT:0:12}" == "${EXPECT:0:12}" ]]; then
              ok=1
              break
            fi
            sleep 15
          done
          test "$ok" -eq 1
          node -e "
            const h = require('/tmp/vps-health.json');
            if (!h.ok) process.exit(1);
            if (h.service !== 'nassani-admin-api') process.exit(1);
            console.log('OK', h.service, String(h.commit||'').slice(0,12));
          "
