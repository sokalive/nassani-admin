name: Deploy Contabo

on:
  push:
    branches: [main]
    paths:
      - 'deploy/contabo/**'
      - 'server/**'
      - 'src/**'
      - 'package.json'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Skip when CONTABO_SSH_KEY is not configured
        id: gate
        env:
          CONTABO_SSH_KEY: ${{ secrets.CONTABO_SSH_KEY }}
        run: |
          if [ -z "${CONTABO_SSH_KEY}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::CONTABO_SSH_KEY not set — skipping VPS deploy. Run pull-and-apply.sh on the VPS console."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Contabo VPS
        if: steps.gate.outputs.skip != 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 144.91.117.90
          username: root
          key: ${{ secrets.CONTABO_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd /var/www/osmani-admin-api
            export CERTBOT_EMAIL="${CERTBOT_EMAIL:-admin@osmanitv.com}"
            bash deploy/contabo/pull-and-apply.sh

      - name: Checkout for post-deploy verification
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Verify VPS HTTPS endpoints
        if: steps.gate.outputs.skip != 'true'
        run: |
          set -euo pipefail
          EXPECT="${{ github.sha }}"
          ok=0
          for attempt in $(seq 1 20); do
            curl -fsS "https://api.osmanitv.com/api/health" | tee /tmp/vps-health.json
            COMMIT="$(node -e "console.log(String(require('/tmp/vps-health.json').commit||''))")"
            echo "attempt $attempt commit=${COMMIT:0:12} expect=${EXPECT:0:12}"
            if [[ "${COMMIT:0:12}" == "${EXPECT:0:12}" ]]; then
              ok=1
              break
            fi
            sleep 15
          done
          if [[ "$ok" -ne 1 ]]; then
            echo "ERROR: VPS commit did not match ${EXPECT:0:12} within readiness window" >&2
            exit 1
          fi
          curl -fsSI "https://api.osmanitv.com" | head -1 | grep -q "200"
          curl -fsSI "https://admin.osmanitv.com" | head -1 | grep -q "200"
          node -e "
            const h = require('/tmp/vps-health.json');
            if (!h.ok) { console.error('health not ok', h); process.exit(1); }
            if ((h.pool?.waitingCount ?? 0) > 50) {
              console.error('pool waitingCount too high after deploy', h.pool);
              process.exit(1);
            }
            console.log('VPS commit', String(h.commit || '').slice(0, 12), 'pool.waitingCount', h.pool?.waitingCount);
          "
          curl -fsS "https://api.osmanitv.com/api/runtime/cutover-status" | tee /tmp/vps-cutover.json
          node server/scripts/verify-vps-render-independence.mjs
