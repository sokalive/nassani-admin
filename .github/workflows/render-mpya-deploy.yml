# Render legacy admin static site (osmani-admin-mpya) — optional; authoritative Admin is VPS admin.osmanitv.com.
name: Deploy Render Admin (mpya)

on:
  push:
    branches: [main]
    paths:
      - 'render.yaml'
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - 'index.html'
      - 'public/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render osmani-admin-mpya deploy hook
        env:
          RENDER_MPYA_DEPLOY_HOOK: ${{ secrets.RENDER_MPYA_DEPLOY_HOOK }}
        run: |
          if [ -z "${RENDER_MPYA_DEPLOY_HOOK}" ]; then
            echo "::notice::RENDER_MPYA_DEPLOY_HOOK not configured — skipping Render mpya deploy. Authoritative Admin SPA is deployed via Contabo apply-cutover.sh to https://admin.osmanitv.com"
            exit 0
          fi
          curl -fsSL -X POST "${RENDER_MPYA_DEPLOY_HOOK}"
          echo "Triggered Render osmani-admin-mpya deploy"
